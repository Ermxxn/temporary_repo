<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental |  Hotel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Deleted inline styles, moved to style.css */
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark p-3">
    <div class="container">
        <a class="navbar-brand" href="index.html">Luxury Hotel</a>

        <div class="d-flex ms-auto">
            <a href="index.html" class="btn btn-outline-light me-2">Home</a>
            <a href="rental.html" class="btn btn-light me-2">Rental</a>
            <a href="contact.html" class="btn btn-outline-light">Contact</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">Our Room Types</h2>
    <div class="row text-center">
        <div class="col-md-4 mb-3">
            <div class="card p-4">
                <h5>Single Room</h5>
                <p class="text-primary">RM100 / day</p>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card p-4">
                <h5>Double Room</h5>
                <p class="text-primary">RM180 / day</p>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card p-4">
                <h5>Suite Room</h5>
                <p class="text-primary">RM300 / day</p>
            </div>
        </div>
    </div>

    <hr class="my-5" style="border-top: 1px solid rgba(255,255,255,0.2);">

    <div class="row">
        <div class="col-md-6">
            <h3 class="mb-3">Price Calculator</h3>
            <div class="card p-4">
                <label>Number of Days</label>
                <input type="number" id="days" class="form-control mb-2" placeholder="e.g. 3">
                <label>Price per Day (RM)</label>
                <input type="number" id="price" class="form-control mb-2" placeholder="e.g. 100">
                <button onclick="calcTotal()" class="btn btn-primary w-100">Calculate Total</button>
                <p id="total"></p>
            </div>
        </div>

        <div class="col-md-6">
            <h3 class="mb-3">Booking Form</h3>
            <div class="card p-4">
                <form id="bookingForm">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control mb-2" placeholder="Your Name">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control mb-2" placeholder="name@example.com">
                    <button type="submit" class="btn btn-success w-100 mt-2">Book Now</button>
                </form>
            </div>
        </div>
    </div>

</div>

<footer class="bg-dark text-white text-center p-4 mt-5">
    <p class="mb-0">© 2026 Hotel Booking System | All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
